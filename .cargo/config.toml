# targets x86(windows / linux) and arm(macos, linux, windows)

# arm systems
[target.aarch64-apple-darwin]
rustflags = [
  "-C", "target-feature=+neon",
  "-C", "target-cpu=native",
]

[target.aarch64-pc-windows-msvc]
rustflags = [
  "-C", "target-feature=+neon",
  "-C", "target-cpu=native",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C", "target-feature=+neon",
  "-C", "target-cpu=native",
]

# x86 systems
[target.x86_64-pc-windows-msvc]
rustflags = [
  "-C", "target-feature=+avx2,+sse4.2",
  "-C", "target-cpu=native",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "target-feature=+avx2,+sse4.2",
  "-C", "target-cpu=native",
]
